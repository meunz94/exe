# 커스텀 도메인 사용: 사이트가 도메인 루트("/")에서 서빙되므로 Vite base 는 항상 "/" 로 고정.
# (커스텀 도메인은 public/CNAME 파일로 지정 → 빌드 시 dist 로 복사됨)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          export VITE_BASE="/"
          npm ci
          npm run build

      - name: Disable Jekyll on Pages
        run: touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
