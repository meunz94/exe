# 사용자 페이지: 저장소 이름이 반드시 {GitHub아이디}.github.io 여야 함 (예: meunz94/meunz94.github.io)
# → https://meunz94.github.io/ 루트에 배포되며, 빌드 시 Vite base 는 "/" 로 맞춰짐.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            export VITE_BASE="/"
          else
            export VITE_BASE="/${REPO}/"
          fi
          npm ci
          npm run build

      - name: Disable Jekyll on Pages
        run: touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
